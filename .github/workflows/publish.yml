name: Publish to npm

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Configure npm for OIDC
        run: |
          npm config set //registry.npmjs.org/:_auth ""
          npm config set //registry.npmjs.org/:always-auth false

      - name: Publish to npm
        run: npm publish --access public --ignore-scripts --provenance
        env:
          NPM_CONFIG_PROVENANCE: "true"
